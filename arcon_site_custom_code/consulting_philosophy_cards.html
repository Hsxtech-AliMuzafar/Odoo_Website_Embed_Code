<div id="philosophySection" class="odoo-custom-snippet">
    <style>
        #philosophySection {
            --primary: #D5264D;
            --secondary: #270B3E;
            --bg-light: #E9E7EC;
            --white: #ffffff;
            --text-dark: #1B050A;
            --transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);

            position: relative;
            width: 100%;
            padding: 100px 20px;
            background-color: var(--bg-light);
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Inter', sans-serif;
            color: var(--text-dark);
            overflow: hidden;
        }

        #philosophySection .header {
            text-align: center;
            max-width: 800px;
            margin-bottom: 70px;
            z-index: 10;
        }

        #philosophySection .header h2 {
            font-size: clamp(2rem, 5vw, 2.8rem);
            font-weight: 900;
            line-height: 1.2;
            color: var(--secondary);
            margin-bottom: 20px;
        }

        #philosophySection .header .accent-line {
            width: 80px;
            height: 4px;
            background: var(--primary);
            margin: 0 auto;
            border-radius: 2px;
        }

        /* Card Grid */
        #philosophySection .cards-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            width: 100%;
            max-width: 1200px;
            perspective: 1500px;
            z-index: 10;
        }

        /* 3D Flip Card Logic - Stable Wrapper Pattern */
        #philosophySection .pillar-wrapper {
            perspective: 1500px;
            height: 400px;
        }

        #philosophySection .pillar-card {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: var(--transition);
            cursor: pointer;
        }

        #philosophySection .pillar-wrapper:hover .pillar-card {
            transform: rotateY(180deg);
        }

        #philosophySection .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(39, 11, 62, 0.05);
            border: 1px solid rgba(213, 38, 77, 0.05);
        }

        /* Front Face */
        #philosophySection .face-front {
            background-color: var(--white);
        }

        #philosophySection .icon-wrapper {
            width: 80px;
            height: 80px;
            background: rgba(213, 38, 77, 0.08);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
            color: var(--primary);
            transition: var(--transition);
        }

        #philosophySection .pillar-card:hover .icon-wrapper {
            background: var(--primary);
            color: white;
        }

        #philosophySection .face-front h3 {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--secondary);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #philosophySection .face-front .step-number {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 15px;
            opacity: 0.6;
        }

        /* Back Face */
        #philosophySection .face-back {
            background-color: var(--secondary);
            transform: rotateY(180deg);
            color: var(--white);
            border: none;
        }

        #philosophySection .face-back p {
            font-size: 1.5rem;
            line-height: 1.4;
            font-weight: 600;
            color: var(--bg-light);
        }

        #philosophySection .face-back .outcome-tag {
            margin-top: 30px;
            padding: 8px 20px;
            background: rgba(213, 38, 77, 0.2);
            border: 1px solid var(--primary);
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Decorative Elements */
        #philosophySection .bg-circle {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(213, 38, 77, 0.03) 0%, transparent 70%);
            top: -200px;
            right: -200px;
            z-index: 1;
            pointer-events: none;
        }

        @media (max-width: 992px) {
            #philosophySection .cards-grid {
                grid-template-columns: 1fr;
                max-width: 500px;
            }

            #philosophySection .pillar-card {
                height: 320px;
            }
        }
    </style>

    <div class="bg-circle"></div>

    <div class="header">
        <h2>Effective systems require both strategic thinking and structural precision.</h2>
        <div class="accent-line"></div>
    </div>

    <div class="cards-grid">
        <!-- Pillar 1 -->
        <div class="pillar-wrapper">
            <div class="pillar-card">
                <div class="card-face face-front">
                    <span class="step-number">PHASE 01</span>
                    <div class="icon-wrapper">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8" />
                            <line x1="21" y1="21" x2="16.65" y2="16.65" />
                        </svg>
                    </div>
                    <h3>Analyze</h3>
                </div>
                <div class="card-face face-back">
                    <p>We analyze before designing.</p>
                    <div class="outcome-tag">Strategic Foundation</div>
                </div>
            </div>
        </div>

        <!-- Pillar 2 -->
        <div class="pillar-wrapper">
            <div class="pillar-card">
                <div class="card-face face-front">
                    <span class="step-number">PHASE 02</span>
                    <div class="icon-wrapper">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                            <line x1="3" y1="9" x2="21" y2="9" />
                            <line x1="9" y1="21" x2="9" y2="9" />
                        </svg>
                    </div>
                    <h3>Structure</h3>
                </div>
                <div class="card-face face-back">
                    <p>We structure before automating.</p>
                    <div class="outcome-tag">Architectural Integrity</div>
                </div>
            </div>
        </div>

        <!-- Pillar 3 -->
        <div class="pillar-wrapper">
            <div class="pillar-card">
                <div class="card-face face-front">
                    <span class="step-number">PHASE 03</span>
                    <div class="icon-wrapper">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 20v-6M6 20V10M18 20V4" />
                        </svg>
                    </div>
                    <h3>Measure</h3>
                </div>
                <div class="card-face face-back">
                    <p>We measure before optimizing.</p>
                    <div class="outcome-tag">System Reliability</div>
                </div>
            </div>
        </div>
    </div>
</div>
