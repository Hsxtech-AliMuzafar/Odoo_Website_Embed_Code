<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Hero Intro</title>
    <style>
        :root {
            --primary-color: #D5264D;
            --secondary-color: #270B3E;
            --accent-color: #E9E7EC;
            --dark-color: #1B050A;
            --glass-bg: rgba(39, 11, 62, 0.4);
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--dark-color);
            color: var(--accent-color);
            overflow-x: hidden;
        }

        .hero-section {
            position: relative;
            width: 100%;
            height: 100vh;
            min-height: 600px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top right, var(--secondary-color), var(--dark-color));
            overflow: hidden;
        }

        /* Techy Background Elements */
        #bg-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.35;
        }

        .bg-shape {
            position: absolute;
            filter: blur(80px);
            z-index: 0;
            opacity: 0.45;
            pointer-events: none;
        }

        .shape-1 {
            top: -10%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: var(--primary-color);
            border-radius: 50%;
            animation: float-base 20s infinite alternate;
        }

        .shape-2 {
            bottom: -10%;
            left: -10%;
            width: 400px;
            height: 400px;
            background: var(--secondary-color);
            border-radius: 50%;
            animation: float-base 15s infinite alternate-reverse;
        }

        @keyframes float-base {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(50px, 50px) scale(1.1);
            }
        }

        .grid-overlay {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(213, 38, 77, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(213, 38, 77, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 2;
            pointer-events: none;
        }

        /* Content Styles */
        .content-wrapper {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 900px;
            text-align: center;
            padding: 3rem;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(233, 231, 236, 0.1);
            border-radius: 24px;
            animation: fadeIn 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero-title {
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 2rem;
            background: linear-gradient(to bottom, var(--accent-color), #bbb);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-subtitle {
            font-size: clamp(1rem, 2vw, 1.25rem);
            line-height: 1.6;
            margin-bottom: 3rem;
            color: rgba(233, 231, 236, 0.85);
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
        }

        .cta-group {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
        }

        .btn {
            display: inline-block;
            padding: 1.1rem 2.8rem;
            font-weight: 700;
            text-decoration: none;
            border-radius: 50px;
            transition: var(--transition);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
            border: 2px solid var(--primary-color);
        }

        .btn-primary:hover {
            background: transparent;
            color: var(--primary-color);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(213, 38, 77, 0.4);
        }

        .btn-outline {
            border: 2px solid var(--accent-color);
            color: var(--accent-color);
        }

        .btn-outline:hover {
            background: var(--accent-color);
            color: var(--dark-color);
            transform: translateY(-5px);
        }

        @media (max-width: 768px) {
            .content-wrapper {
                padding: 2rem;
            }

            .hero-title {
                font-size: 2.2rem;
            }

            .cta-group {
                flex-direction: column;
                gap: 1rem;
            }

            .btn {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>

<body>

    <section class="hero-section">
        <canvas id="bg-canvas"></canvas>
        <div class="grid-overlay"></div>
        <div class="bg-shape shape-1" id="shape1"></div>
        <div class="bg-shape shape-2" id="shape2"></div>

        <div class="content-wrapper">
            <h1 class="hero-title">Consulting Intelligence.<br>Engineered Solutions.</h1>
            <p class="hero-subtitle">Business consulting, BI dashboards, and custom Odoo development designed for
                performance, clarity, and scale.</p>
            <div class="cta-group">
                <a href="/about-consultancy" class="btn btn-primary">Explore Consulting</a>
                <a href="/dev-portfolio" class="btn btn-outline">Explore Development</a>
            </div>
        </div>
    </section>

    <script>
        /* --- TECH BACKGROUND ANIMATION --- */
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const particleCount = 60;
        let mouse = { x: null, y: null };

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.x;
            mouse.y = e.y;
            // Parallax shapes
            const s1 = document.getElementById('shape1');
            const s2 = document.getElementById('shape2');
            if (s1) s1.style.transform = `translate(${e.x * 0.02}px, ${e.y * 0.02}px)`;
            if (s2) s2.style.transform = `translate(${e.x * -0.03}px, ${e.y * -0.03}px)`;
        });

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.size = Math.random() * 2 + 1;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;

                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }
            draw() {
                ctx.fillStyle = '#D5264D';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            resize();
            for (let i = 0; i < particleCount; i++) particles.push(new Particle());
            animate();
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            // Draw connections
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < 150) {
                        ctx.strokeStyle = `rgba(213, 38, 77, ${1 - dist / 150})`;
                        ctx.lineWidth = 0.5;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animate);
        }

        init();
    </script>
</body>

</html>
