<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --primary-color: #D5264D;
            --secondary-color: #270B3E;
            --accent-color: #E9E7EC;
            --dark-color: #1B050A;
            --glass-bg: rgba(39, 11, 62, 0.4);
            --glass-border: rgba(233, 231, 236, 0.1);
            --transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }

        body {
            background-color: #270B3E;
            color: var(--accent-color);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 60px 20px;
            display: grid;
            place-items: start center;
            min-height: 100vh;
            width: 100%;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        .metrics-container {
            max-width: 1000px;
            width: 100%;
            background: rgba(27, 5, 10, 0.9);
            padding: 3.5rem;
            border-radius: 32px;
            border: 1px solid var(--glass-border);
            position: relative;
            overflow: hidden;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
        }

        /* Scanline / Grid Effect */
        .metrics-container::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(213, 38, 77, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(213, 38, 77, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            pointer-events: none;
            z-index: 0;
        }

        .metrics-header {
            position: relative;
            z-index: 1;
            margin-bottom: 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left h2 {
            font-size: 1.8rem;
            font-weight: 900;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
        }

        .header-left p {
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            color: var(--primary-color);
            margin: 0.5rem 0 0 0;
            opacity: 0.8;
        }

        .system-status {
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #a0a0a0;
        }

        .github-logo {
            color: #fff;
            opacity: 0.8;
            transition: var(--transition);
        }

        .github-logo:hover {
            opacity: 1;
            transform: scale(1.1);
        }

        .status-pulse {
            width: 8px;
            height: 8px;
            background: #27ae60;
            border-radius: 50%;
            box-shadow: 0 0 10px #27ae60;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.5);
                opacity: 0.5;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            position: relative;
            z-index: 1;
        }

        .metric-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 2rem;
            border-radius: 20px;
            text-align: center;
            transition: var(--transition);
        }

        .metric-card:hover {
            background: rgba(213, 38, 77, 0.05);
            border-color: rgba(213, 38, 77, 0.2);
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .metric-value {
            font-size: 3rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 0.5rem;
            display: block;
        }

        .metric-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(233, 231, 236, 0.6);
            font-weight: 600;
        }

        /* Loading Animation */
        .loading-overlay {
            position: absolute;
            inset: 0;
            background: var(--secondary-color);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 1s ease;
        }

        .loading-terminal {
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            color: var(--primary-color);
            margin-top: 1rem;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(213, 38, 77, 0.1);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 1s infinite linear;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            .metrics-container {
                padding: 2rem;
            }

            .metric-value {
                font-size: 2.5rem;
            }
        }
    </style>
</head>

<body>

    <div class="metrics-container">
        <div id="loader" class="loading-overlay">
            <div class="spinner"></div>
            <div class="loading-terminal" id="terminal-text">SYS.EXECUTE: FETCHING_METRICS...</div>
        </div>

        <header class="metrics-header">
            <div class="header-left">
                <h2>Ecosystem Vitality</h2>
            </div>
            <div class="system-status">
                <div style="display: flex; align-items: center; gap: 8px;">
                    <div class="status-pulse"></div>
                    System Online
                </div>
                <a href="https://github.com/Hsxtech-AliMuzafar" target="_blank" class="github-logo"
                    title="View GitHub Profile">
                    <svg height="32" viewBox="0 0 16 16" version="1.1" width="32" fill="currentColor">
                        <path
                            d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z">
                        </path>
                    </svg>
                </a>
            </div>
        </header>

        <div class="metrics-grid">
            <div class="metric-card">
                <span class="metric-value" id="repo-count">0</span>
                <span class="metric-label">Public Repositories</span>
            </div>
            <div class="metric-card">
                <span class="metric-value" id="follower-count">0</span>
                <span class="metric-label">GitHub Followers</span>
            </div>
            <div class="metric-card">
                <span class="metric-value" id="activity-score">98%</span>
                <span class="metric-label">Build Integrity</span>
            </div>
            <div class="metric-card">
                <span class="metric-value" id="uptime">24/7</span>
                <span class="metric-label">System Availability</span>
            </div>
        </div>
    </div>

    <script>
        const GITHUB_API = "https://api.github.com/users/Hsxtech-AliMuzafar";

        async function fetchStats() {
            try {
                const response = await fetch(GITHUB_API);
                const data = await response.json();

                // Artificial delay for terminal effect
                setTimeout(() => {
                    updateUI(data);
                }, 1500);

            } catch (error) {
                console.error("API Failure:", error);
                document.getElementById('terminal-text').innerText = "SYS.ERROR: CONNECTION_FAILURE";
            }
        }

        function updateUI(data) {
            const repoEl = document.getElementById('repo-count');
            const followEl = document.getElementById('follower-count');
            const loader = document.getElementById('loader');

            animateNumber(repoEl, data.public_repos);
            animateNumber(followEl, data.followers);

            loader.classList.add('hidden');
        }

        function animateNumber(element, target) {
            let current = 0;
            const speed = target / 50;
            const interval = setInterval(() => {
                current += speed;
                if (current >= target) {
                    element.innerText = target;
                    clearInterval(interval);
                } else {
                    element.innerText = Math.floor(current);
                }
            }, 30);
        }

        document.addEventListener('DOMContentLoaded', fetchStats);
    </script>

</body>

</html>
