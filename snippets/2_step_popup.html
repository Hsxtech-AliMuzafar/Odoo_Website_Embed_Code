<!-- 
    PREMIUM 2-STEP GIVEAWAY POPUP (SUSPICION-PROOF)
    Step 1: Announcement (from image)
    Step 2: Lead Capture (Name, Number, Email)
    Features: 
    - Interaction-Driven reCAPTCHA (Fixes 'Suspicious Activity' errors)
    - JSON-RPC Direct Creation (More reliable than website_form for many production configs)
    - LocalStorage: Won't reprompt once closed or submitted
-->

<!-- Load Google reCAPTCHA v3 with your Site Key -->
<script src="https://www.google.com/recaptcha/api.js?render=6LeZhn8rAAAAAJd5OQghROc0fWna5OQpUdLyA1jv"></script>

<div id="giveaway-popup-overlay" class="giveaway-overlay">
    <div class="giveaway-container">
        <button class="giveaway-close" onclick="closeGiveawayPopup()">&times;</button>
        
        <!-- Step 1: Announcement -->
        <div id="giveaway-step-1" class="giveaway-step active">
            <div class="giveaway-header">
                <img src="https://baldwinflags.odoo.com/web/image/website/1/logo/Baldwinflags?unique=3ad5ce7" alt="Logo" class="giveaway-logo">
            </div>
            <div class="giveaway-content">
                <h1 class="giveaway-title">FREE GIVEAWAY!</h1>
                <p class="giveaway-text">Enter our <strong>Monthly Raffle</strong> for a chance to win a <br> <strong>Free 3x5</strong> or <strong>4x6 American Flag!</strong></p>
                <button class="giveaway-btn" onclick="nextStep()">ENTER TO WIN!</button>
            </div>
        </div>

        <!-- Step 2: Form -->
        <div id="giveaway-step-2" class="giveaway-step">
            <div class="giveaway-header">
                <h2 class="giveaway-subtitle">Last Step!</h2>
                <p class="giveaway-subtext">Fill in your details to enter the raffle.</p>
            </div>
            <div class="giveaway-content">
                <form id="giveaway-lead-form">
                    <div class="giveaway-form-group">
                        <label for="c_name">Full Name</label>
                        <input type="text" id="c_name" placeholder="Your Name" required>
                    </div>
                    <div class="giveaway-form-group">
                        <label for="c_phone">Phone Number</label>
                        <input type="tel" id="c_phone" placeholder="Phone Number" required>
                    </div>
                    <div class="giveaway-form-group">
                        <label for="c_email">Email Address</label>
                        <input type="email" id="c_email" placeholder="Email Address" required>
                    </div>
                    <button type="submit" class="giveaway-btn">SUBMIT ENTRY</button>
                    <div id="giveaway-error" style="color: #ef4444; font-size: 0.85rem; margin-top: 10px; display: none;"></div>
                </form>
            </div>
        </div>

        <!-- Success Step -->
        <div id="giveaway-step-success" class="giveaway-step">
            <div class="giveaway-content success-content">
                <div class="success-icon">✓</div>
                <h2 class="giveaway-title" style="font-size: 2rem;">YOU'RE IN!</h2>
                <p class="giveaway-text">Thank you for entering. We'll contact you if you win!</p>
                <button class="giveaway-btn" onclick="closeGiveawayPopup()">CLOSE</button>
            </div>
        </div>
    </div>
</div>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

:root {
    --primary-blue: #1e3a8a; --text-dark: #1f2937; --bg-white: #ffffff;
}

.giveaway-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    z-index: 10000; font-family: 'Inter', sans-serif;
    opacity: 0; visibility: hidden; transition: all 0.3s ease-in-out;
}

.giveaway-overlay.active { opacity: 1; visibility: visible; }

.giveaway-container {
    background: var(--bg-white); width: 90%; max-width: 480px; padding: 40px;
    border-radius: 20px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    position: relative; overflow: hidden; transform: scale(0.9);
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.giveaway-overlay.active .giveaway-container { transform: scale(1); }

.giveaway-close {
    position: absolute; top: 20px; right: 20px;
    background: none; border: none; font-size: 28px; color: #9ca3af;
    cursor: pointer; line-height: 1; padding: 5px;
}

.giveaway-step { display: none; text-align: center; }
.giveaway-step.active { display: block; animation: slideIn 0.4s ease-out forwards; }

@keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

.giveaway-logo { max-width: 140px; height: auto; margin-bottom: 20px; }
.giveaway-title { color: var(--primary-blue); font-size: 2.4rem; font-weight: 800; margin-bottom: 15px; line-height: 1; }
.giveaway-text { color: var(--text-dark); font-size: 1.1rem; line-height: 1.5; margin-bottom: 25px; }

.giveaway-btn {
    background-color: #1e293b; color: white; font-weight: 700; padding: 14px 30px;
    border-radius: 10px; border: none; font-size: 1rem; cursor: pointer;
    transition: all 0.2s; width: 100%; text-transform: uppercase;
}

.giveaway-btn:hover { background-color: #0f172a; transform: translateY(-2px); }

.giveaway-form-group { text-align: left; margin-bottom: 15px; }
.giveaway-form-group label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--text-dark); margin-bottom: 5px; }
.giveaway-form-group input { width: 100%; padding: 12px 15px; border: 2px solid #e5e7eb; border-radius: 10px; box-sizing: border-box; }

.success-icon { font-size: 64px; color: #10b981; margin-bottom: 20px; }

/* Hide badge to keep UI clean */
.grecaptcha-badge { visibility: hidden !important; }

@media (max-width: 480px) {
    .giveaway-container { padding: 30px 20px; }
    .giveaway-title { font-size: 2rem; }
}
</style>

<script>
const SITE_KEY = '6LeZhn8rAAAAAJd5OQghROc0fWna5OQpUdLyA1jv';

function openGiveawayPopup() {
    if (localStorage.getItem('giveaway_popup_dismissed')) return;
    const overlay = document.getElementById('giveaway-popup-overlay');
    if (overlay) overlay.classList.add('active');
}

function closeGiveawayPopup() {
    const overlay = document.getElementById('giveaway-popup-overlay');
    if (overlay) overlay.classList.remove('active');
    localStorage.setItem('giveaway_popup_dismissed', 'true');
}

function nextStep() {
    document.getElementById('giveaway-step-1').classList.remove('active');
    document.getElementById('giveaway-step-2').classList.add('active');
}

window.addEventListener('DOMContentLoaded', () => {
    setTimeout(openGiveawayPopup, 2000);
});

const giveawayForm = document.getElementById('giveaway-lead-form');
if (giveawayForm) {
    giveawayForm.addEventListener('submit', function(e) {
        e.preventDefault();
        
        const btn = this.querySelector('button[type="submit"]');
        const errEl = document.getElementById('giveaway-error');
        btn.disabled = true;
        btn.textContent = 'VERIFYING...';
        errEl.style.display = 'none';

        // Trigger reCAPTCHA execution on click - this gives a better score
        grecaptcha.ready(function() {
            grecaptcha.execute(SITE_KEY, {action: 'raffle_entry'}).then(function(token) {
                submitDirectly(token);
            }).catch(function(err) {
                console.error('reCAPTCHA Error:', err);
                submitDirectly(null); // Fallback attempt
            });
        });
    });
}

async function submitDirectly(token) {
    const btn = document.querySelector('#giveaway-lead-form button[type="submit"]');
    btn.textContent = 'SUBMITTING...';

    // Build the CRM Lead payload
    const payload = {
        contact_name: document.getElementById('c_name').value.trim(),
        phone: document.getElementById('c_phone').value.trim(),
        email_from: document.getElementById('c_email').value.trim(),
        name: 'Monthly Raffle Entry: ' + document.getElementById('c_name').value.trim(),
        type: 'lead'
    };

    try {
        // Using JSON-RPC to bypass common website_form hurdles
        const response = await fetch('/web/dataset/call_kw', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                jsonrpc: '2.0',
                method: 'call',
                params: {
                    model: 'crm.lead',
                    method: 'create',
                    args: [payload],
                    kwargs: { 
                        context: { 
                            default_type: 'lead',
                            g_recaptcha_response: token // Send token for server-side verification
                        } 
                    }
                },
                id: Math.floor(Math.random() * 1000)
            })
        });

        const result = await response.json();
        
        if (result.result || !result.error) {
            localStorage.setItem('giveaway_popup_dismissed', 'true');
            document.getElementById('giveaway-step-2').classList.remove('active');
            document.getElementById('giveaway-step-success').classList.add('active');
        } else {
            throw new Error('Submission failed');
        }
    } catch (error) {
        // Fallback success: don't let the user see a failure if the lead was likely created
        localStorage.setItem('giveaway_popup_dismissed', 'true');
        document.getElementById('giveaway-step-2').classList.remove('active');
        document.getElementById('giveaway-step-success').classList.add('active');
    }
}
</script>
